[project]
name = "data-ingest"
version = "0.1.0"
description = "Parses Enron MIME email files and MySQL employee dump into a SQLite database"
readme = "README.md"
authors = [
    { email = "45532845+blipk@users.noreply.github.com" }
]
requires-python = ">=3.12"
dependencies = [
    "sqlglot>=30.1.0",
]

[project.scripts]
data-ingest = "data_ingest.__main__:main"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv_build]
data = [
    { include = "src/data_ingest/data/*.gz", format = "sdist" },
]

[dependency-groups]
dev = [
    "mypy>=1.20.0",
]
